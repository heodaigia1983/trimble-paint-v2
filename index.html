<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Paint Approval Tool</title>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:       #111318;
      --surface:  #1a1d24;
      --card:     #20242e;
      --border:   #2e3340;
      --text:     #e8eaf0;
      --muted:    #5a6070;
      --green:    #34d874;
      --green-bg: rgba(52,216,116,.1);
      --gray-c:   #8b95a8;
      --gray-bg:  rgba(139,149,168,.1);
      --blue:     #4d9fff;
      --blue-bg:  rgba(77,159,255,.1);
      --warn:     #f5a623;
      --err:      #ff5f5f;
    }
    *{box-sizing:border-box;margin:0;padding:0}

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12.5px;
      padding: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .hd {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 13px;
      border-bottom: 1px solid var(--border);
    }
    .hd-icon {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg,#34d874,#4d9fff);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .hd-name  { font-size: 13.5px; font-weight: 700; letter-spacing: -.2px; }
    .hd-sub   { font-size: 10.5px; color: var(--muted); margin-top: 2px; }

    /* ── Upload ── */
    .upload {
      position: relative; border: 1.5px dashed var(--border);
      border-radius: 10px; padding: 15px 12px;
      text-align: center; cursor: pointer; margin-bottom: 12px;
      transition: border-color .2s, background .2s;
    }
    .upload:hover, .upload.over { border-color: var(--blue); background: var(--blue-bg); }
    .upload input {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .upload-ico  { font-size: 22px; margin-bottom: 5px; }
    .upload-hint { font-size: 11.5px; color: var(--muted); }
    .upload-hint b { color: var(--blue); font-weight: 600; }
    .fname {
      margin-top: 6px; font-size: 11.5px; color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Legend ── */
    .legend { display: flex; gap: 7px; margin-bottom: 13px; }
    .leg {
      flex: 1; display: flex; align-items: center; gap: 7px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; font-size: 11px;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .dot-g { background: var(--green);  box-shadow: 0 0 7px var(--green); }
    .dot-s { background: var(--gray-c); }

    /* ── Stats grid ── */
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 13px; }
    .scard {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 9px; padding: 9px 11px;
    }
    .slabel { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .sval   {
      font-size: 18px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace; line-height: 1;
    }
    .sval.c-blue  { color: var(--blue); }
    .sval.c-green { color: var(--green); }
    .sval.c-gray  { color: var(--gray-c); }

    /* ── Progress ── */
    .prog-wrap {
      height: 3px; background: var(--border); border-radius: 2px;
      margin-bottom: 12px; overflow: hidden; display: none;
    }
    .prog-wrap.on { display: block; }
    .prog-bar {
      height: 100%; width: 0;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: 2px; transition: width .25s;
    }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 7px; margin-bottom: 10px; }
    button {
      flex: 1; padding: 9px 6px; border: none; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: opacity .15s, transform .1s;
    }
    button:active  { transform: scale(.96); }
    button:disabled{ opacity: .35; cursor: not-allowed; }
    #applyBtn { background: var(--green); color: #0a1a0f; }
    #resetBtn { background: var(--card);  color: var(--text); border: 1px solid var(--border); }
    #saveBtn  { background: var(--blue);  color: #06101a; }

    /* ── Input ── */
    .field { margin-bottom: 10px; }
    .flabel { font-size: 10.5px; color: var(--muted); margin-bottom: 4px; }
    input[type=text] {
      width: 100%; padding: 8px 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 12px; outline: none;
      transition: border-color .2s;
    }
    input[type=text]:focus { border-color: var(--blue); }

    /* ── Log ── */
    .log-title { font-size: 10px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
    #log {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 11px;
      height: 155px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; line-height: 1.65;
      color: var(--muted); white-space: pre-wrap; word-break: break-all;
    }
    #log .ok   { color: var(--green); }
    #log .info { color: var(--blue); }
    #log .warn { color: var(--warn); }
    #log .err  { color: var(--err); }
    #log::-webkit-scrollbar { width: 3px; }
    #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .footer { margin-top: 13px; font-size: 10px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>

<div class="hd">
  <div class="hd-icon">🎨</div>
  <div>
    <div class="hd-name">Paint Approval Tool</div>
    <div class="hd-sub">Developed by Le Van Thao</div>
  </div>
</div>

<div class="upload" id="uploadZone">
  <input type="file" id="fileInput" accept=".xls,.xlsx"/>
  <div class="upload-ico">📂</div>
  <div class="upload-hint">Kéo thả hoặc <b>chọn file Excel</b></div>
  <div class="fname" id="fileName">Chưa chọn file</div>
</div>

<div class="legend">
  <div class="leg"><div class="dot dot-g"></div>Có trong Excel → <b>Xanh</b></div>
  <div class="leg"><div class="dot dot-s"></div>Còn lại → <b>Xám</b></div>
</div>

<div class="stats">
  <div class="scard"><div class="slabel">Tổng cấu kiện</div><div class="sval c-blue"  id="s-total">—</div></div>
  <div class="scard"><div class="slabel">GUID trong Excel</div><div class="sval c-blue" id="s-excel">—</div></div>
  <div class="scard"><div class="slabel">✓ Tô xanh</div><div class="sval c-green" id="s-green">—</div></div>
  <div class="scard"><div class="slabel">Tô xám</div><div class="sval c-gray"  id="s-gray">—</div></div>
</div>

<div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>

<div class="btn-row">
  <button id="applyBtn" disabled>▶ Áp màu</button>
  <button id="resetBtn">↺ Reset</button>
</div>

<div class="field">
  <div class="flabel">Tên view muốn lưu (tuỳ chọn)</div>
  <input type="text" id="viewName" placeholder="Ví dụ: Approval 2026-04-18"/>
</div>
<div class="btn-row">
  <button id="saveBtn">💾 Save View</button>
</div>

<div class="log-title">Log</div>
<div id="log"></div>

<div class="footer">Paint Approval Tool v7.0 · Le Van Thao</div>

<script src="app.js?v=7"></script>
</body>
</html>
